<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>PLO — Usuários</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="app-layout">
  <aside class="sidebar" id="sidebar"></aside>
  <div class="main-content">
    <div class="topbar" id="topbar"></div>
    <div class="page-content">

      <div class="form-section">
        <div class="form-title">Cadastrar Usuário</div>
        <div class="form-grid">
          <div class="form-group">
            <label>Nome</label>
            <input id="nome" placeholder="Nome completo">
          </div>
          <div class="form-group">
            <label>CPF</label>
            <input id="documento" placeholder="000.000.000-00">
          </div>
          <div class="form-group">
            <label>Email</label>
            <input id="email" type="email" placeholder="email@empresa.com">
          </div>
          <div class="form-group">
            <label>Senha</label>
            <input id="senha" type="password" placeholder="••••••••">
          </div>
          <div class="form-group">
            <label>Papel / Função</label>
            <select id="tipo">
              <option value="vendedor">Vendedor</option>
              <option value="supervisor">Supervisor</option>
              <option value="desenhista">Desenhista</option>
            </select>
          </div>
        </div>
        <div class="form-actions">
          <button class="btn btn-primary" onclick="salvar()">Cadastrar Usuário</button>
          <p id="msg" class="msg-hidden"></p>
        </div>
      </div>

      <div class="table-card">
        <div class="table-card-header">
          <span class="table-card-title">Usuários Cadastrados</span>
        </div>
        <table class="data-table">
          <thead><tr>
            <th>#</th><th>Nome</th><th>Email</th><th>Documento</th><th>Telefone</th><th>Papéis</th>
          </tr></thead>
          <tbody id="tbody"><tr><td colspan="6" class="empty-state">Carregando...</td></tr></tbody>
        </table>
      </div>

    </div>
  </div>
</div>
<script src="auth.js"></script>
<script>
const u = requirePapel(['supervisor']);
if (u) {
  buildSidebar('/usuarios');
  buildTopbar('Usuários');
  carregarUsuarios();
}

async function carregarUsuarios() {
  const res = await fetch('/api/usuarios');
  const lista = await res.json();
  const tbody = document.getElementById('tbody');
  if (!lista.length) {
    tbody.innerHTML = '<tr><td colspan="6" class="empty-state">Nenhum usuário</td></tr>';
    return;
  }
  tbody.innerHTML = lista.map(u => `
    <tr>
      <td class="text-muted">${u.pessoa_id}</td>
      <td><strong>${u.nome}</strong></td>
      <td class="text-muted">${u.email || '—'}</td>
      <td class="text-muted">${u.documento || '—'}</td>
      <td class="text-muted">${u.telefone || '—'}</td>
      <td><span class="badge badge-aberto">${u.papeis || '—'}</span></td>
    </tr>`).join('');
}

async function salvar() {
  const dados = {
    nome: document.getElementById('nome').value,
    documento: document.getElementById('documento').value,
    email: document.getElementById('email').value,
    senha: document.getElementById('senha').value,
    tipo: document.getElementById('tipo').value
  };
  const ok = validar([
    ['msg', validarNome(dados.nome)],
    ['msg', validarEmail(dados.email)],
    ['msg', validarSenha(dados.senha)],
    ['msg', dados.documento ? validarCPF(dados.documento) : null],
  ]);
  if (!ok) return;
  const res = await fetch('/api/usuarios', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify(dados)
  });
  const r = await res.json();
  if (r.sucesso) {
    showMsg('msg', r.mensagem, 'ok');
    ['nome','documento','email','senha'].forEach(id => document.getElementById(id).value = '');
    carregarUsuarios();
  } else {
    showMsg('msg', r.erro || 'Erro ao cadastrar.', 'erro');
  }
}
</script>
</body>
</html>
