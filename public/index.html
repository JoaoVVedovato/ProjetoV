<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PLO — Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
<div class="login-page">
  <div class="login-box">
    <div class="login-logo">
      <div class="badge" style="font-family:'Rajdhani',sans-serif;font-weight:700;font-size:22px;color:white;width:52px;height:52px;background:#c0392b;border-radius:12px;display:flex;align-items:center;justify-content:center;margin:0 auto 12px;">P</div>
      <h1>PLO</h1>
      <p>Perfil Metais</p>
    </div>
    <div class="login-form">
      <div class="form-group">
        <label>Email</label>
        <input type="email" id="email" placeholder="seu@email.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label>Senha</label>
        <input type="password" id="senha" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button class="login-btn" onclick="fazerLogin()">ENTRAR</button>
      <p id="erro" class="login-error" style="display:none"></p>
    </div>
  </div>
</div>

<script src="auth.js"></script>
<script>
  window.addEventListener('DOMContentLoaded', () => {
    const u = getUsuario();
    if (u) window.location.href = '/dashboard';

    document.getElementById('senha').addEventListener('keydown', e => {
      if (e.key === 'Enter') fazerLogin();
    });
  });

  async function fazerLogin() {
    const email = document.getElementById('email').value.trim();
    const senha = document.getElementById('senha').value;
    const erroEl = document.getElementById('erro');

    const erroEmail = validarEmail(email);
    if (erroEmail) {
      erroEl.textContent = erroEmail;
      erroEl.style.display = 'block';
      return;
    }
    if (!senha) {
      erroEl.textContent = 'Preencha a senha.';
      erroEl.style.display = 'block';
      return;
    }

    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, senha })
      });
      const data = await res.json();

      if (data.sucesso) {
        sessionStorage.setItem('usuario', JSON.stringify(data.usuario));
        window.location.href = '/dashboard';
      } else {
        erroEl.textContent = data.mensagem || 'Email ou senha inválidos.';
        erroEl.style.display = 'block';
      }
    } catch (err) {
      erroEl.textContent = 'Erro ao conectar ao servidor.';
      erroEl.style.display = 'block';
    }
  }
</script>
</body>
</html>
